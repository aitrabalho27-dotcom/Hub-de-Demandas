<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Demandas Profissionais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .input-padrao {
            width: 100%; padding: 0.7rem; background-color: #334155; border: 2px solid #475569;
            border-radius: 0.6rem; color: #f8fafc; outline: none; text-transform: uppercase; font-size: 0.8rem;
        }
        .input-padrao:focus { border-color: #10b981; }
        #appSection { display: none; }
        .status-pendente { border-left: 4px solid #ef4444; } 
        .status-em-andamento { border-left: 4px solid #f59e0b; } 
        .status-concluido { border-left: 4px solid #10b981; opacity: 0.6; } 
        .tag { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; }
    </style>
</head>
<body>

    <div id="loginSection" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950 p-4">
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-2xl w-full max-w-[320px] text-center">
            <h2 class="text-lg font-black mb-4 text-emerald-500 uppercase tracking-tight italic">Hub de Demandas</h2>
            <input type="password" id="passInput" placeholder="Senha de Acesso" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-lg mb-3 text-center text-white outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
            <button onclick="validar()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold p-3 rounded-lg shadow-lg uppercase text-sm transition-all">Acessar Painel</button>
        </div>
    </div>

    <div id="appSection">
        <div class="min-h-screen p-4 lg:p-8">
            <div class="max-w-5xl mx-auto space-y-6">
                
                <div class="flex justify-between items-center bg-slate-900 p-5 rounded-2xl border border-slate-800">
                    <div>
                        <h1 class="text-lg font-black text-emerald-500 uppercase italic leading-none">Hub de Demandas</h1>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Gestão Pessoal de Pendências</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="exportar()" class="text-[9px] bg-slate-800 p-2 rounded-lg font-bold hover:bg-slate-700">💾 EXPORTAR</button>
                        <label class="text-[9px] bg-slate-800 p-2 rounded-lg font-bold hover:bg-slate-700 cursor-pointer">
                            📂 IMPORTAR <input type="file" class="hidden" onchange="importar(event)">
                        </label>
                        <button onclick="location.reload()" class="text-[9px] bg-red-900/20 text-red-400 p-2 rounded-lg font-bold hover:bg-red-900/40 transition-all">SAIR</button>
                    </div>
                </div>

                <div class="card p-5 border-t-4 border-t-emerald-600">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                        <div class="md:col-span-2">
                            <label class="text-[10px] font-bold text-slate-500 ml-1 uppercase">O que aconteceu?</label>
                            <input type="text" id="i_descricao" placeholder="EX: RESOLVER PENDÊNCIA COM FORNECEDOR" class="input-padrao">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 ml-1 uppercase">Referência / Contato</label>
                            <input type="text" id="i_origem" placeholder="QUEM?" class="input-padrao">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 ml-1 uppercase">Categoria</label>
                            <select id="i_tipo" class="input-padrao">
                                <option value="PROBLEMA">⚠️ PROBLEMA / AVARIA</option>
                                <option value="COBRANCA">📞 COBRAR RETORNO</option>
                                <option value="COTACAO">💰 NOVA COTAÇÃO</option>
                                <option value="OUTROS">📝 OUTROS / NOTAS</option>
                            </select>
                        </div>
                    </div>
                    <button onclick="salvarDemanda()" class="w-full mt-4 bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3 rounded-xl uppercase shadow-lg transition-all text-sm">
                        📌 Registrar Demanda
                    </button>
                </div>

                <div id="listaDemandas" class="space-y-3 pb-10"></div>

                <div class="text-center">
                    <button onclick="limparConcluidos()" class="text-[10px] text-slate-600 hover:text-red-400 font-bold uppercase underline">Limpar resolvidos</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        let demandas = JSON.parse(localStorage.getItem('db_demandas_compras_v2') || '[]');

        function validar() {
            if(document.getElementById('passInput').value === "526385") {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('appSection').style.display = 'block';
                renderizar();
            } else { alert("Senha incorreta!"); }
        }

        document.getElementById('passInput').addEventListener('keypress', (e) => e.key === 'Enter' && validar());

        function salvarDemanda() {
            const desc = document.getElementById('i_descricao').value.trim();
            const origem = document.getElementById('i_origem').value.trim();
            const tipo = document.getElementById('i_tipo').value;
            if(!desc) return;

            demandas.unshift({
                id: Date.now(),
                descricao: desc.toUpperCase(),
                origem: origem.toUpperCase() || "GERAL",
                tipo: tipo,
                status: 'pendente',
                data: new Date().toLocaleDateString('pt-BR')
            });
            localStorage.setItem('db_demandas_compras_v2', JSON.stringify(demandas));
            document.getElementById('i_descricao').value = '';
            document.getElementById('i_origem').value = '';
            renderizar();
        }

        function alterarStatus(id) {
            const i = demandas.findIndex(d => d.id === id);
            const ord = ['pendente', 'andamento', 'concluido'];
            demandas[i].status = ord[(ord.indexOf(demandas[i].status) + 1) % 3];
            localStorage.setItem('db_demandas_compras_v2', JSON.stringify(demandas));
            renderizar();
        }

        function excluirUm(id) {
            if(confirm("Excluir definitivamente?")) {
                demandas = demandas.filter(d => d.id !== id);
                localStorage.setItem('db_demandas_compras_v2', JSON.stringify(demandas));
                renderizar();
            }
        }

        function limparConcluidos() {
            if(confirm("Limpar concluídos?")) {
                demandas = demandas.filter(d => d.status !== 'concluido');
                localStorage.setItem('db_demandas_compras_v2', JSON.stringify(demandas));
                renderizar();
            }
        }

        function renderizar() {
            const container = document.getElementById('listaDemandas');
            if(demandas.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-700 py-10 font-bold uppercase text-[10px]">Sem pendências no momento.</p>';
                return;
            }
            container.innerHTML = demandas.map(d => `
                <div class="card p-4 border-l-4 ${d.status==='pendente'?'border-l-red-500 bg-slate-800':d.status==='andamento'?'border-l-amber-500 bg-slate-800':'border-l-emerald-500 bg-slate-900 opacity-60'} flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="flex-1 w-full">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="tag ${d.tipo==='PROBLEMA'?'bg-red-900 text-red-200':'bg-slate-700 text-slate-300'}">${d.tipo}</span>
                            <span class="text-[10px] text-slate-500 font-bold">${d.data}</span>
                        </div>
                        <h3 class="font-bold text-slate-100 uppercase text-xs sm:text-sm">${d.descricao}</h3>
                        <p class="text-[10px] text-emerald-400 font-bold mt-1">REF: ${d.origem}</p>
                    </div>
                    <div class="flex gap-2 items-center w-full md:w-auto">
                        <button onclick="alterarStatus(${d.id})" class="flex-1 md:flex-none px-4 py-2 rounded-lg bg-slate-700 text-[9px] font-black hover:bg-slate-600 uppercase">
                            ${d.status==='pendente'?'🔴 PENDENTE':d.status==='andamento'?'🟡 TRATATIVA':'🟢 RESOLVIDO'}
                        </button>
                        <button onclick="excluirUm(${d.id})" class="p-2 text-slate-600 hover:text-red-400">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function exportar() {
            const blob = new Blob([JSON.stringify(demandas, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `HUB_DEMANDAS_${new Date().toLocaleDateString().replace(/\//g, '-')}.json`;
            a.click();
        }

        function importar(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const dados = JSON.parse(ev.target.result);
                    demandas = [...dados, ...demandas.filter(b => !dados.find(d => d.id === b.id))];
                    localStorage.setItem('db_demandas_compras_v2', JSON.stringify(demandas));
                    renderizar();
                } catch(err) { alert("Arquivo inválido!"); }
            };
            reader.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
